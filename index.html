<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Resonance Articulation Game</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f4f4f9; 
            color: #333; 
        }
        h1 { color: #2c3e50; text-align: center; }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { 
            flex: 1;
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        #recordBtn { background-color: #e74c3c; }
        #recordBtn:hover { background-color: #c0392b; }
        .script-box { 
            font-size: 18px; 
            line-height: 1.6; 
            background: #ecf0f1; 
            padding: 20px; 
            border-left: 5px solid #3498db; 
            margin: 20px 0; 
            min-height: 100px;
        }
        select { 
            padding: 10px; 
            font-size: 16px; 
            width: 100%; 
            margin-bottom: 10px; 
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .instruction { font-size: 14px; color: #7f8c8d; margin-bottom: 20px; }
        #result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f8f5;
            border-radius: 5px;
            border-left: 5px solid #1abc9c;
            display: none;
        }
        .score { font-size: 24px; font-weight: bold; color: #16a085; }
    </style>
</head>
<body>
    <h1>Resonance Articulation</h1>
    <div class="card">
        <label for="mode"><strong>选择训练关卡：</strong></label>
        <select id="mode" onchange="updateScript()">
            <option value="warmup">Level 1: 发音肌肉热身 (清晰度训练)</option>
            <option value="qhht">Level 2: QHHT 引导 (平稳、降调、慢速)</option>
            <option value="brainwaves">Level 3: Master Your Brainwaves™ (权威、重音)</option>
        </select>

        <div class="instruction" id="instruction-display">
            注意发音：干脆的 'T' 音，宽阔的 'A' 音，以及词尾不卷舌的 'R'。
        </div>

        <div id="script-display" class="script-box">
            Let the water settle. The path to the past. You are drifting deeper and further.
        </div>

        <div class="btn-group">
            <button id="playBtn" onclick="playAudio()">🎧 听示范</button>
            <button id="recordBtn" onclick="toggleRecording()">🎤 点击开始录音</button>
        </div>

        <div id="result-box">
            <p><strong>你读出的是：</strong> <span id="user-transcript">...</span></p>
            <p><strong>发音匹配度：</strong> <span class="score" id="user-score">0%</span></p>
            <p style="font-size: 14px; color: #7f8c8d;">(匹配度越低，说明系统越听不懂你的某些单词，请重点对比示范音频调整口型)</p>
        </div>
    </div>

    <script>
        const content = {
            warmup: {
                text: "Let the water settle. The path to the past. You are drifting deeper and further.",
                instruction: "注意发音：干脆的 'T' 音 (water/settle)，宽阔的 'A' 音 (path/past)，以及词尾不卷舌的 'R' (deeper/further)。"
            },
            qhht: {
                text: "As you drift deeper into this space... notice how effortlessly your mind expands. Letting go of the conscious chatter... stepping into the vastness of your own inner wisdom.",
                instruction: "注意语流：用腹式呼吸，语速放缓，音调向下走，字与字之间连贯但辅音清晰。"
            },
            brainwaves: {
                text: "Welcome to Master Your Brainwaves. Today, we will structurally recalibrate your cognitive frequencies. By understanding your neurological baseline, you take absolute control of your professional trajectory.",
                instruction: "注意气场：音色明亮，在长单词 (structurally/neurological) 的重音上加码，展现学术与专业权威感。"
            }
        };

        let recognition;
        let isRecording = false;
        let finalTranscript = '';

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; // 修改为连续录音，允许停顿
            recognition.interimResults = true; // 允许实时显示结果
            recognition.lang = 'en-GB'; 
        }

        function updateScript() {
            const mode = document.getElementById('mode').value;
            document.getElementById('script-display').innerText = content[mode].text;
            document.getElementById('instruction-display').innerText = content[mode].instruction;
            document.getElementById('result-box').style.display = 'none';
        }

        function playAudio() {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.resume();
            window.speechSynthesis.cancel();

            const text = document.getElementById('script-display').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB'; 

            const voices = window.speechSynthesis.getVoices();
            const britishVoice = voices.find(voice => voice.lang === 'en-GB' || voice.name.includes('UK') || voice.name.includes('British'));
            if (britishVoice) utterance.voice = britishVoice;

            const mode = document.getElementById('mode').value;
            utterance.rate = mode === 'qhht' ? 0.75 : (mode === 'brainwaves' ? 0.95 : 0.9);
            utterance.pitch = mode === 'qhht' ? 0.8 : 1.0;

            const playBtn = document.getElementById('playBtn');
            utterance.onstart = function() {
                playBtn.innerText = "🔊 正在播放...";
                playBtn.style.backgroundColor = "#27ae60";
            };
            utterance.onend = utterance.onerror = function() {
                playBtn.innerText = "🎧 听示范";
                playBtn.style.backgroundColor = "#3498db";
            };

            window.speechSynthesis.speak(utterance);
        }

        function cleanText(text) {
            return text.toLowerCase().replace(/[.,!?'™]/g, '').trim().split(/\s+/).filter(w => w.length > 0);
        }

        function calculateScore(transcript) {
            const targetText = document.getElementById('script-display').innerText;
            const targetWords = cleanText(targetText);
            const userWords = cleanText(transcript);
            
            let matchCount = 0;
            userWords.forEach(word => {
                if (targetWords.includes(word)) matchCount++;
            });

            let score = targetWords.length > 0 ? Math.min(100, Math.round((matchCount / targetWords.length) * 100)) : 0;
            document.getElementById('user-score').innerText = score + "%";
        }

        function toggleRecording() {
            if (!recognition) {
                alert("你的浏览器不支持录音打分功能，请使用最新版 Chrome。");
                return;
            }
            
            const btn = document.getElementById('recordBtn');

            if (isRecording) {
                // 停止录音
                recognition.stop();
                return;
            }

            // 开始录音
            window.speechSynthesis.cancel(); // 停止播放
            finalTranscript = '';
            isRecording = true;
            btn.innerText = "⏹️ 录音中... (读完请点我结束)";
            btn.style.backgroundColor = "#e67e22";
            document.getElementById('user-transcript').innerText = "...";
            document.getElementById('user-score').innerText = "0%";
            document.getElementById('result-box').style.display = 'block';

            recognition.start();

            recognition.onresult = function(event) {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                const displayTranscript = finalTranscript + interimTranscript;
                document.getElementById('user-transcript').innerText = displayTranscript;
                calculateScore(displayTranscript); // 实时打分
            };

            recognition.onend = function() {
                isRecording = false;
                btn.innerText = "🎤 点击开始录音";
                btn.style.backgroundColor = "#e74c3c";
            };

            recognition.onerror = function(event) {
                // 忽略没有检测到声音的错误，防止中断
                if(event.error === 'no-speech') return; 
                alert("录音出错：" + event.error);
                recognition.stop();
            };
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
        }
    </script>
</body>
</html>
