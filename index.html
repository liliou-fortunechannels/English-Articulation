<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Resonance Articulation Game</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f4f4f9; 
            color: #333; 
        }
        h1 { color: #2c3e50; text-align: center; }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { 
            flex: 1;
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        #recordBtn { background-color: #e74c3c; }
        #recordBtn:hover { background-color: #c0392b; }
        .script-box { 
            font-size: 18px; 
            line-height: 1.6; 
            background: #ecf0f1; 
            padding: 20px; 
            border-left: 5px solid #3498db; 
            margin: 20px 0; 
            min-height: 100px;
        }
        select { 
            padding: 10px; 
            font-size: 16px; 
            width: 100%; 
            margin-bottom: 10px; 
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .instruction { font-size: 14px; color: #7f8c8d; margin-bottom: 20px; }
        #result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f8f5;
            border-radius: 5px;
            border-left: 5px solid #1abc9c;
            display: none;
        }
        .score { font-size: 24px; font-weight: bold; color: #16a085; }
    </style>
</head>
<body>
    <h1>Resonance Articulation</h1>
    <div class="card">
        <label for="mode"><strong>选择训练关卡：</strong></label>
        <select id="mode" onchange="updateScript()">
            <option value="warmup">Level 1: 发音肌肉热身 (清晰度训练)</option>
            <option value="qhht">Level 2: QHHT 引导 (平稳、降调、慢速)</option>
            <option value="brainwaves">Level 3: Master Your Brainwaves™ (权威、重音)</option>
        </select>

        <div class="instruction" id="instruction-display">
            注意发音：干脆的 'T' 音，宽阔的 'A' 音，以及词尾不卷舌的 'R'。
        </div>

        <div id="script-display" class="script-box">
            Let the water settle. The path to the past. You are drifting deeper and further.
        </div>

        <div class="btn-group">
            <button id="playBtn" onclick="playAudio()">🎧 听示范</button>
            <button id="recordBtn" onclick="startRecording()">🎤 点击跟读并打分</button>
        </div>

        <div id="result-box">
            <p><strong>你读出的是：</strong> <span id="user-transcript"></span></p>
            <p><strong>发音匹配度：</strong> <span class="score" id="user-score">0%</span></p>
            <p style="font-size: 14px; color: #7f8c8d;">(如果没读完，请语速稍微加快一点点)</p>
        </div>
    </div>

    <script>
        const content = {
            warmup: {
                text: "Let the water settle. The path to the past. You are drifting deeper and further.",
                instruction: "注意发音：干脆的 'T' 音 (water/settle)，宽阔的 'A' 音 (path/past)，以及词尾不卷舌的 'R' (deeper/further)。"
            },
            qhht: {
                text: "As you drift deeper into this space... notice how effortlessly your mind expands. Letting go of the conscious chatter... stepping into the vastness of your own inner wisdom.",
                instruction: "注意语流：用腹式呼吸，语速放缓，音调向下走，字与字之间连贯但辅音清晰。"
            },
            brainwaves: {
                text: "Welcome to Master Your Brainwaves. Today, we will structurally recalibrate your cognitive frequencies. By understanding your neurological baseline, you take absolute control of your professional trajectory.",
                instruction: "注意气场：音色明亮，在长单词 (structurally/neurological) 的重音上加码，展现学术与专业权威感。"
            }
        };

        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-GB'; 
        }

        function updateScript() {
            const mode = document.getElementById('mode').value;
            document.getElementById('script-display').innerText = content[mode].text;
            document.getElementById('instruction-display').innerText = content[mode].instruction;
            document.getElementById('result-box').style.display = 'none';
        }

        // --- 核心修复区：语音播放逻辑 ---
        function playAudio() {
            if (!('speechSynthesis' in window)) {
                alert("抱歉，你的浏览器不支持语音合成功能。");
                return;
            }

            // 修复 Chrome 引擎卡死 bug：先唤醒，再清空队列
            window.speechSynthesis.resume();
            window.speechSynthesis.cancel();

            const text = document.getElementById('script-display').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            
            // 修复中英文引擎冲突：强制声明这是一段英语，且为英音
            utterance.lang = 'en-GB'; 

            // 尝试寻找更纯正的英式发音人
            const voices = window.speechSynthesis.getVoices();
            const britishVoice = voices.find(voice => voice.lang === 'en-GB' || voice.name.includes('UK') || voice.name.includes('British'));
            if (britishVoice) {
                utterance.voice = britishVoice;
            }

            const mode = document.getElementById('mode').value;
            utterance.rate = mode === 'qhht' ? 0.75 : (mode === 'brainwaves' ? 0.95 : 0.9);
            utterance.pitch = mode === 'qhht' ? 0.8 : 1.0;

            const playBtn = document.getElementById('playBtn');
            utterance.onstart = function() {
                playBtn.innerText = "🔊 正在播放...";
                playBtn.style.backgroundColor = "#27ae60";
            };
            utterance.onend = function() {
                playBtn.innerText = "🎧 听示范";
                playBtn.style.backgroundColor = "#3498db";
            };
            utterance.onerror = function(event) {
                console.error("播放报错:", event);
                alert("播放失败，请刷新网页重试。");
                playBtn.innerText = "🎧 听示范";
                playBtn.style.backgroundColor = "#3498db";
            };

            window.speechSynthesis.speak(utterance);
        }
        // --- 修复区结束 ---

        function cleanText(text) {
            return text.toLowerCase().replace(/[.,!?'™]/g, '').trim().split(/\s+/);
        }

        function startRecording() {
            if (!recognition) {
                alert("你的浏览器不支持录音打分功能，请使用最新版 Chrome。");
                return;
            }
            
            // 录音时停止播放
            window.speechSynthesis.cancel();

            const btn = document.getElementById('recordBtn');
            btn.innerText = "🎙️ 正在聆听... (请说话)";
            btn.style.backgroundColor = "#e67e22";

            recognition.start();

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('user-transcript').innerText = transcript;
                
                const targetText = document.getElementById('script-display').innerText;
                const targetWords = cleanText(targetText);
                const userWords = cleanText(transcript);
                
                let matchCount = 0;
                userWords.forEach(word => {
                    if (targetWords.includes(word)) matchCount++;
                });

                let score = Math.min(100, Math.round((matchCount / targetWords.length) * 100));
                
                document.getElementById('user-score').innerText = score + "%";
                document.getElementById('result-box').style.display = 'block';
            };

            recognition.onspeechend = function() {
                recognition.stop();
                resetBtn();
            };

            recognition.onerror = function(event) {
                alert("录音出错：" + event.error + " (请确保网页已允许麦克风权限)");
                resetBtn();
            };
        }

        function resetBtn() {
            const btn = document.getElementById('recordBtn');
            btn.innerText = "🎤 点击跟读并打分";
            btn.style.backgroundColor = "#e74c3c";
        }

        // 预加载语音包 (解决首次点击无声问题)
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
        }
    </script>
</body>
</html>
